# Ubuntu Installation Configuration
#
# This file contains configuration values used across installation scripts.
# Source this file or read values as needed.
#
# Usage:
#   source config/default.conf
#   OR
#   export $(grep -v '^#' config/default.conf | xargs)

# ============================================================================
# User Settings
# ============================================================================

# Git configuration
GIT_USER_NAME="Carlos A. Lang-Sanou"
GIT_USER_EMAIL="carlos.lang@gmail.com"
GIT_DEFAULT_BRANCH="main"

# ============================================================================
# Installation Paths
# ============================================================================

# Base installation directory for user-level installs
INSTALL_PREFIX="${HOME}/installed"

# Conda/Mamba installation path
CONDA_PREFIX="${HOME}/installed/miniforge3"

# Custom applications directory
APPS_DIR="${HOME}/installed"

# ============================================================================
# GPU Configuration
# ============================================================================

# CUDA version (if pinning versions)
# CUDA_VERSION="12.0"

# ============================================================================
# Version Pinning (Optional)
# ============================================================================

# Set to 'true' to pin specific versions for reproducibility
PIN_VERSIONS=false

# Docker version (if pinning)
# DOCKER_VERSION="24.0.0"

# VS Code version (if pinning)
# VSCODE_VERSION="1.85.0"

# Python version for conda environments
# PYTHON_VERSION="3.11"

# ============================================================================
# Installation Preferences
# ============================================================================

# Preferred package manager order: apt, snap, flatpak
PREFER_APT=true
ALLOW_SNAP=true
ALLOW_FLATPAK=false

# Skip interactive prompts (for automated installations)
NON_INTERACTIVE=false

# Enable debug mode for all scripts
# DEBUG=0

# ============================================================================
# Network Settings
# ============================================================================

# Proxy settings (if needed)
# HTTP_PROXY=""
# HTTPS_PROXY=""

# Mirror/Repository overrides (for faster downloads)
# UBUNTU_MIRROR="http://archive.ubuntu.com/ubuntu"

# ============================================================================
# Logging
# ============================================================================

# Log directory
LOG_DIR="${HOME}/installations/logs"

# Keep logs for this many days
LOG_RETENTION_DAYS=30

# ============================================================================
# Feature Flags
# ============================================================================

# Install optional/recommended packages
INSTALL_OPTIONAL=true

# Install development tools by default
INSTALL_DEV_TOOLS=true

# Cleanup downloaded files after installation
AUTO_CLEANUP=true

